<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle for clarity -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#f97316" stroke-width="2"/>
  
  <!-- Graduation cap -->
  <rect x="55" y="55" width="90" height="50" rx="4" fill="#1e3a5f"/>
  <polygon points="100,50 50,75 150,75" fill="#1e3a5f"/>
  <circle cx="100" cy="45" r="4" fill="#1e3a5f"/>
  <line x1="100" y1="49" x2="115" y2="35" stroke="#1e3a5f" stroke-width="3"/>
  
  <!-- Book -->
  <path d="M 60 85 Q 60 75 70 75 L 130 75 Q 140 75 140 85 L 140 145 Q 140 155 130 155 L 70 155 Q 60 155 60 145 Z" fill="none" stroke="#4db8a8" stroke-width="5"/>
  
  <!-- Book spine -->
  <line x1="70" y1="75" x2="70" y2="155" stroke="#2d7a6f" stroke-width="4"/>
  
  <!-- Circuit lines on book pages -->
  <circle cx="85" cy="95" r="3" fill="#4db8a8"/>
  <circle cx="115" cy="95" r="3" fill="#4db8a8"/>
  <circle cx="85" cy="110" r="3" fill="#4db8a8"/>
  <circle cx="115" cy="110" r="3" fill="#4db8a8"/>
  <circle cx="85" cy="125" r="3" fill="#4db8a8"/>
  <circle cx="115" cy="125" r="3" fill="#4db8a8"/>
  <circle cx="85" cy="140" r="3" fill="#4db8a8"/>
  <circle cx="115" cy="140" r="3" fill="#4db8a8"/>
  
  <!-- Connecting lines -->
  <line x1="85" y1="95" x2="115" y2="95" stroke="#4db8a8" stroke-width="2"/>
  <line x1="85" y1="110" x2="115" y2="110" stroke="#4db8a8" stroke-width="2"/>
  <line x1="85" y1="125" x2="115" y2="125" stroke="#4db8a8" stroke-width="2"/>
  <line x1="85" y1="140" x2="115" y2="140" stroke="#4db8a8" stroke-width="2"/>
</svg>